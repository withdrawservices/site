<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Features — withdraw.cc</title>

<style>
:root {
  --bg: #040404;
  --fg: #f4f4f4;
  --muted: #8f8f8f;
  --edge: #151515;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  overflow-x: hidden;
}

canvas#bg {
  position: fixed;
  inset: 0;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.04"/></svg>');
  mix-blend-mode: overlay;
  z-index: 99;
}

header {
  position: fixed;
  inset: 0 0 auto 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 56px;
  backdrop-filter: blur(14px);
  background: rgba(4,4,4,0.6);
  border-bottom: 1px solid var(--edge);
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  font-weight: 700;
  letter-spacing: 1.4px;
}

.logo img {
  width: 34px;
  height: 34px;
}

nav a {
  margin-left: 28px;
  color: var(--muted);
  font-size: 0.9rem;
  text-decoration: none;
}

main {
  perspective: 1400px;
}

.page {
  min-height: 100vh;
  padding: 160px 32px 120px;
  display: grid;
  place-items: center;
}

.page-inner {
  max-width: 1100px;
  width: 100%;
  transform-style: preserve-3d;
  transition: transform 0.12s ease;
}

.page-inner h1 {
  font-size: clamp(2.6rem, 6vw, 4.2rem);
  font-weight: 800;
  letter-spacing: -1.4px;
}

.page-inner p.lead {
  margin-top: 18px;
  max-width: 520px;
  color: var(--muted);
  line-height: 1.6;
}

.features {
  margin-top: 80px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 38px;
}

.card {
  border-radius: 20px;
  border: 1px solid var(--edge);
  background: transparent;
  perspective: 1000px;
}

.card-inner {
  padding: 38px;
  border-radius: 18px;
  background: transparent;

  transform-style: preserve-3d;
  transition:
    transform 0.22s ease,
    box-shadow 0.22s ease,
    background 0.22s ease;
}

.card:hover .card-inner {
  background: #ffffff;
  transform: rotateX(6deg) rotateY(-6deg) translateY(-10px);
  box-shadow: 0 40px 120px rgba(0,0,0,0.95);
}

.card:hover {
  border-color: #ffffff;
}

.card h3 {
  margin-bottom: 12px;
  transition: color 0.22s ease;
}

.card p {
  color: var(--muted);
  font-size: 0.96rem;
  line-height: 1.55;
  transition: color 0.22s ease;
}

.card:hover h3,
.card:hover p {
  color: #000;
}

footer {
  text-align: center;
  padding: 48px 32px;
  border-top: 1px solid var(--edge);
  color: var(--muted);
  font-size: 0.85rem;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <div class="logo">
    <img src="logo.png" />
    <span>withdraw.cc</span>
  </div>
  <nav>
    <a href="withdraw.cc">Home</a>
  </nav>
</header>

<main>
<section class="page">
  <div class="page-inner" id="tilt">
    <h1>Features</h1>
    <p class="lead">
      uhh what do i put here again?
    </p>

    <div class="features">
      <div class="card"><div class="card-inner">
        <h3>1</h3>
        <p>.</p>
      </div></div>

      <div class="card"><div class="card-inner">
        <h3>2</h3>
        <p>.</p>
      </div></div>

      <div class="card"><div class="card-inner">
        <h3>3</h3>
        <p>.</p>
      </div></div>

      <div class="card"><div class="card-inner">
        <h3>4</h3>
        <p>.</p>
      </div></div>

      <div class="card"><div class="card-inner">
        <h3>5</h3>
        <p>.</p>
      </div></div>

      <div class="card"><div class="card-inner">
        <h3>6</h3>
        <p>.</p>
      </div></div>
    </div>
  </div>
</section>
</main>

<footer>© 2026 withdraw.cc</footer>

<script>
const tilt = document.getElementById('tilt');
window.addEventListener('mousemove', e => {
  const x = (innerWidth / 2 - e.clientX) / 42;
  const y = (innerHeight / 2 - e.clientY) / 42;
  tilt.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl');
const dpr = window.devicePixelRatio || 1;

function resize() {
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize', resize);
resize();

const vs = `
attribute vec2 p;
void main(){gl_Position=vec4(p,0,1);}
`;

const fs = `
precision highp float;
uniform vec2 r;
uniform float t;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
 vec2 i=floor(p),f=fract(p);
 f=f*f*(3.-2.*f);
 return mix(
  mix(hash(i),hash(i+vec2(1,0)),f.x),
  mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),
  f.y);
}

void main(){
 vec2 uv=gl_FragCoord.xy/r-.5;
 uv.x*=r.x/r.y;
 float time=t*.35;
 float v=0.;
 v+=noise(uv*1.8+time);
 v+=.6*noise(uv*3.5-time*1.4);
 v+=.3*noise(uv*7.-time*2.);
 float g=smoothstep(.15,.85,v);
 vec3 a=vec3(.01,.005,.006);
 vec3 b=vec3(.32,.06,.10);
 vec3 c=mix(a,b,g);
 c*=.92+.08*sin(t*.6);
 gl_FragColor=vec4(c,1);
}
`;

function sh(type,src){
 const s=gl.createShader(type);
 gl.shaderSource(s,src);
 gl.compileShader(s);
 return s;
}

const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const rLoc=gl.getUniformLocation(prog,'r');
const tLoc=gl.getUniformLocation(prog,'t');
const start=performance.now();

(function draw(){
 gl.uniform2f(rLoc,canvas.width,canvas.height);
 gl.uniform1f(tLoc,(performance.now()-start)/1000);
 gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
 requestAnimationFrame(draw);
})();
</script>

</body>
</html>
