<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>withdraw.cc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="detail-page">

  <!-- ===== NAVBAR ===== -->
  <nav id="navbar" class="navbar-solid">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">WITHDRAW</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html?type=movie" class="active">Movies</a></li>
        <li><a href="search.html?type=tv">TV Shows</a></li>
        <li><a href="index.html#my-list">My List</a></li>
      </ul>
    </div>
    <div class="nav-right">
      <div class="nav-search" id="nav-search">
        <button class="search-btn" id="search-toggle" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <input type="text" id="search-input" placeholder="Titles, people, genres" autocomplete="off" />
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===== MOVIE DETAIL ===== -->
  <main class="detail-main">

    <!-- Backdrop + Hero -->
    <div class="detail-backdrop-wrap" id="detail-backdrop-wrap">
      <div class="detail-backdrop" id="detail-backdrop"></div>
      <div class="detail-backdrop-overlay"></div>
    </div>

    <div class="detail-content container">
      <!-- Back Button -->
      <a href="javascript:history.back()" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>

      <!-- Title & Meta -->
      <div class="detail-header" id="detail-header">
        <div class="skeleton-title skeleton"></div>
        <div class="skeleton-text skeleton"></div>
      </div>

      <!-- Player -->
      <div class="player-section">
        <div class="player-container" id="player-container">
          <div class="player-loading">
            <div class="spinner"></div>
            <p>Loading player…</p>
          </div>
        </div>
      </div>

      <!-- Detail Info -->
      <div class="detail-info" id="detail-info"></div>

      <!-- Cast -->
      <section class="detail-section" id="cast-section" style="display:none">
        <h2 class="section-title">Cast</h2>
        <div class="cast-row" id="cast-row"></div>
      </section>

      <!-- Similar Movies -->
      <section class="detail-section" id="similar-section" style="display:none">
        <h2 class="section-title">You May Also Like</h2>
        <div class="row-track" id="similar-row"></div>
      </section>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo">WITHDRAW</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
